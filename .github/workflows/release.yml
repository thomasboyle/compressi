name: Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  DOTNET_NOLOGO: '1'
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
  NUGET_XMLDOC_MODE: skip

jobs:
  release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !contains(github.event.head_commit.message, '[skip release]')
    # windows-latest already includes .NET 8 SDKs and Inno Setup 6.
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Compressi.App/Compressi.App.csproj', 'Compressi.Core/Compressi.Core.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Cache FFmpeg
        id: cache-ffmpeg
        uses: actions/cache@v6
        with:
          path: Compressi.App/Assets/ffmpeg
          key: ffmpeg-win64-gpl-v1

      - name: Download FFmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        shell: pwsh
        run: .\scripts\get-ffmpeg.ps1

      - name: Resolve next version
        id: version
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $false

          $tag = gh api repos/${{ github.repository }}/releases/latest --jq .tag_name 2>$null
          if ($LASTEXITCODE -ne 0) { $tag = '' }

          if ($tag -match '^v?(\d+)\.(\d+)\.(\d+)$') {
            $version = "{0}.{1}.{2}" -f [int]$Matches[1], [int]$Matches[2], ([int]$Matches[3] + 1)
          } else {
            $version = '1.0.0'
          }

          $releaseTag = "v$version"
          gh api "repos/${{ github.repository }}/releases/tags/$releaseTag" 2>$null | Out-Null
          if ($LASTEXITCODE -eq 0) {
            throw "Release $releaseTag already exists."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$releaseTag" >> $env:GITHUB_OUTPUT
          Write-Host "Next release: $releaseTag"
          exit 0

      - name: Build installer
        shell: pwsh
        run: .\scripts\build-installer.ps1 -Version '${{ steps.version.outputs.version }}'

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $false
          $version = '${{ steps.version.outputs.version }}'
          $tag = '${{ steps.version.outputs.tag }}'
          $sha = '${{ github.sha }}'
          $repo = '${{ github.repository }}'
          $versioned = "installer\output\Compressi-Setup-$version-x64.exe"
          $stable = 'installer\output\Compressi-Setup-x64.exe'

          if (-not (Test-Path $versioned) -or -not (Test-Path $stable)) {
            throw "Expected installer outputs missing."
          }

          $notes = @(
            "## Compressi $version"
            ''
            "Windows x64 installer (auto-built from ``$sha``)."
            ''
            '### Download'
            "- [Compressi-Setup-x64.exe](https://github.com/$repo/releases/latest/download/Compressi-Setup-x64.exe) — always the latest build"
            "- ``Compressi-Setup-$version-x64.exe`` — this version"
          ) -join "`n"

          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          gh release create $tag $stable $versioned `
            --title "Compressi $version" `
            --notes $notes `
            --target $sha
          if ($LASTEXITCODE -ne 0) {
            throw "gh release create failed: $LASTEXITCODE"
          }
          Write-Host ("[time] publish release: {0:N1}s" -f $sw.Elapsed.TotalSeconds)
