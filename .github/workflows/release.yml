name: Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  DOTNET_NOLOGO: '1'
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
  NUGET_XMLDOC_MODE: skip

jobs:
  release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !contains(github.event.head_commit.message, '[skip release]')
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '8.0.x'
          cache: true
          cache-dependency-path: |
            Compressi.App/Compressi.App.csproj
            Compressi.Core/Compressi.Core.csproj

      - name: Install tools
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $false
          $sw = [System.Diagnostics.Stopwatch]::StartNew()

          $inno = Start-Job -ScriptBlock {
            choco install innosetup --yes --no-progress
            if ($LASTEXITCODE -ne 0) { throw "choco install innosetup failed: $LASTEXITCODE" }
          }
          $ffmpeg = Start-Job -ScriptBlock {
            Set-Location $using:PWD
            & .\scripts\get-ffmpeg.ps1
          }

          try {
            Wait-Job $inno, $ffmpeg | Out-Null
            Receive-Job $inno -ErrorAction Stop
            Receive-Job $ffmpeg -ErrorAction Stop
          }
          finally {
            Remove-Job $inno, $ffmpeg -Force -ErrorAction SilentlyContinue
          }

          Write-Host ("[time] install tools: {0:N1}s" -f $sw.Elapsed.TotalSeconds)

      - name: Resolve next version
        id: version
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $false

          $tag = gh api repos/${{ github.repository }}/releases/latest --jq .tag_name 2>$null
          if ($LASTEXITCODE -ne 0) { $tag = '' }

          if ($tag -match '^v?(\d+)\.(\d+)\.(\d+)$') {
            $version = "{0}.{1}.{2}" -f [int]$Matches[1], [int]$Matches[2], ([int]$Matches[3] + 1)
          } else {
            $version = '1.0.0'
          }

          $releaseTag = "v$version"
          gh api "repos/${{ github.repository }}/releases/tags/$releaseTag" 2>$null | Out-Null
          if ($LASTEXITCODE -eq 0) {
            throw "Release $releaseTag already exists."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$releaseTag" >> $env:GITHUB_OUTPUT
          Write-Host "Next release: $releaseTag"
          exit 0

      - name: Build installer
        shell: pwsh
        run: .\scripts\build-installer.ps1 -Version '${{ steps.version.outputs.version }}'

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $false
          $version = '${{ steps.version.outputs.version }}'
          $tag = '${{ steps.version.outputs.tag }}'
          $sha = '${{ github.sha }}'
          $repo = '${{ github.repository }}'
          $versioned = "installer\output\Compressi-Setup-$version-x64.exe"
          $stable = 'installer\output\Compressi-Setup-x64.exe'

          if (-not (Test-Path $versioned) -or -not (Test-Path $stable)) {
            throw "Expected installer outputs missing."
          }

          $notes = @(
            "## Compressi $version"
            ''
            "Windows x64 installer (auto-built from ``$sha``)."
            ''
            '### Download'
            "- [Compressi-Setup-x64.exe](https://github.com/$repo/releases/latest/download/Compressi-Setup-x64.exe) — always the latest build"
            "- ``Compressi-Setup-$version-x64.exe`` — this version"
          ) -join "`n"

          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          gh release create $tag $stable $versioned `
            --title "Compressi $version" `
            --notes $notes `
            --target $sha
          if ($LASTEXITCODE -ne 0) {
            throw "gh release create failed: $LASTEXITCODE"
          }
          Write-Host ("[time] publish release: {0:N1}s" -f $sw.Elapsed.TotalSeconds)
